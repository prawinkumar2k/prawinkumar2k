<svg width="800" height="90" viewBox="0 0 800 90" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- BACKGROUND -->
  <rect width="800" height="90" rx="12" fill="#0d0e16"/>
  <rect x="1" y="1" width="798" height="88" rx="11" fill="none" stroke="#00ff88" stroke-width="0.7" stroke-opacity="0.45"/>

  <!-- HEADER STRIPE -->
  <rect x="0" y="0" width="800" height="34" rx="12" fill="#16161e"/>
  <rect x="0" y="22" width="800" height="12" fill="#16161e"/>
  <line x1="0" y1="34" x2="800" y2="34" stroke="#24283b" stroke-width="1"/>

  <!-- GREEN AVAILABILITY LED + HALO -->
  <circle cx="22" cy="17" r="5" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="22" cy="17" r="5" fill="none" stroke="#00ff88" stroke-width="1" stroke-opacity="0.5">
    <animate attributeName="r" values="6;12;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- HEADER TEXT -->
  <text x="38" y="22" fill="#00ff88" font-family="'Courier New',Courier,monospace" font-size="11" font-weight="bold" letter-spacing="1.5">STATUS: ACTIVELY SEEKING OPPORTUNITIES  //  INDIA  //  REMOTE READY</text>

  <!-- LIVE BLINK (top-right) -->
  <circle cx="778" cy="17" r="4" fill="#00ff88">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <text x="764" y="15" fill="#00ff88" font-family="'Courier New',Courier,monospace" font-size="8" font-weight="bold" text-anchor="middle" letter-spacing="1">LIVE</text>

  <!-- LABEL -->
  <text x="18" y="65" fill="#a9b1d6" font-family="'Courier New',Courier,monospace" font-size="9" font-weight="bold" letter-spacing="1" opacity="0.7">ROLES</text>

  <!-- CHIP 1 — AI Systems Engineer -->
  <rect x="65" y="50" width="120" height="22" rx="4" fill="#0a0b12" stroke="#7aa2f7" stroke-width="1"/>
  <text x="125" y="65" fill="#7aa2f7" font-family="'Courier New',Courier,monospace" font-size="9.5" text-anchor="middle">AI Systems Eng</text>

  <!-- CHIP 2 — MERN Full Stack -->
  <rect x="193" y="50" width="120" height="22" rx="4" fill="#0a0b12" stroke="#bb9af7" stroke-width="1"/>
  <text x="253" y="65" fill="#bb9af7" font-family="'Courier New',Courier,monospace" font-size="9.5" text-anchor="middle">MERN Full Stack</text>

  <!-- CHIP 3 — Computer Vision -->
  <rect x="321" y="50" width="120" height="22" rx="4" fill="#0a0b12" stroke="#00f2fe" stroke-width="1"/>
  <text x="381" y="65" fill="#00f2fe" font-family="'Courier New',Courier,monospace" font-size="9.5" text-anchor="middle">Computer Vision</text>

  <!-- CHIP 4 — MLOps Architect -->
  <rect x="449" y="50" width="120" height="22" rx="4" fill="#0a0b12" stroke="#00ff88" stroke-width="1"/>
  <text x="509" y="65" fill="#00ff88" font-family="'Courier New',Courier,monospace" font-size="9.5" text-anchor="middle">MLOps Architect</text>

  <!-- CHIP 5 — IoT + Hardware -->
  <rect x="577" y="50" width="110" height="22" rx="4" fill="#0a0b12" stroke="#f7768e" stroke-width="1"/>
  <text x="632" y="65" fill="#f7768e" font-family="'Courier New',Courier,monospace" font-size="9.5" text-anchor="middle">IoT / Hardware</text>

  <!-- SEPARATOR -->
  <line x1="700" y1="38" x2="700" y2="86" stroke="#24283b" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- RIGHT: LOCATION BLOCK -->
  <text x="750" y="58" fill="#a9b1d6" font-family="'Courier New',Courier,monospace" font-size="9" text-anchor="middle" letter-spacing="0.5">📍 INDIA</text>
  <text x="750" y="72" fill="#00ff88" font-family="'Courier New',Courier,monospace" font-size="8" text-anchor="middle" letter-spacing="0.5">REMOTE READY</text>
  <text x="750" y="84" fill="#7aa2f7" font-family="'Courier New',Courier,monospace" font-size="7.5" text-anchor="middle" opacity="0.7">FULL-TIME / INTERN</text>

</svg>
