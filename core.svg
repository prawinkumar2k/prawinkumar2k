  <line x1="14" y1="92" x2="134" y2="92" stroke="#1f2335" stroke-width="0.5"/>
  <line x1="14" y1="111" x2="134" y2="111" stroke="#1f2335" stroke-width="0.5"/>
  <line x1="14" y1="130" x2="134" y2="130" stroke="#1f2335" stroke-width="0.5"/>
  <line x1="74" y1="52" x2="74" y2="170" stroke="#1f2335" stroke-width="0.5"/>
  <!-- Primary wave -->
  <path d="M14 111 Q30 78 46 125 T74 92 T104 122 T134 111" stroke="#00f2fe" stroke-width="1.8" fill="none">
    <animate attributeName="d"
