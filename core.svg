  <text x="762" y="145" fill="#f7768e" font-family="'Courier New',Courier,monospace" font-size="7" font-weight="bold" text-anchor="middle">RAM</text>
  <text x="762" y="155" fill="#f7768e" font-family="'Courier New',Courier,monospace" font-size="7" text-anchor="middle">72%</text>

</svg>
