  </circle>

  <text x="38" y="25" fill="#7aa2f7" font-family="'Courier New',Courier,monospace" font-size="11" font-weight="bold" letter-spacing="2">AI NEURAL CORE  //  STATUS: ONLINE  //  PID: 0x7F2A  //  BUILD: v4.2.1</text>

  <!-- === LEFT PANEL — OSCILLOSCOPE === -->
  <rect x="14" y="52" width="120" height="118" rx="7" fill="#0a0b12" stroke="#1f2335" stroke-width="1"/>
