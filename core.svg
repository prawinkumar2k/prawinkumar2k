<svg width="800" height="195" viewBox="0 0 800 195" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- BACKGROUND -->
  <rect width="800" height="195" rx="14" fill="#0d0e16"/>
  <rect x="1" y="1" width="798" height="193" rx="13" fill="none" stroke="#7aa2f7" stroke-width="0.5" stroke-opacity="0.5"/>
  <rect x="2" y="2" width="796" height="191" rx="12" fill="none" stroke="#00f2fe" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- HEADER BAR -->
  <rect x="0" y="0" width="800" height="40" rx="14" fill="#16161e"/>
  <rect x="0" y="28" width="800" height="12" fill="#16161e"/>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#24283b" stroke-width="1"/>

  <!-- Status LED -->
  <circle cx="22" cy="20" r="5" fill="#00ff88">
