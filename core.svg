  <circle cx="762" cy="70" r="17" fill="none" stroke="#00ff88" stroke-width="2" stroke-dasharray="107" stroke-dashoffset="22" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 762 70" to="360 762 70" dur="2s" repeatCount="indefinite"/>
