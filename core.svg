    <animate attributeName="opacity" values="1;0.1;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="743" cy="108" r="2.5" fill="#00f2fe">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>

