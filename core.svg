  <circle cx="695" cy="108" r="48" fill="none" stroke="#7aa2f7" stroke-width="2.5" stroke-dasharray="301" stroke-dashoffset="18" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 695 108" to="360 695 108" dur="4s" repeatCount="indefinite"/>
  </circle>

