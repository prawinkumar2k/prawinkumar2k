  <rect x="232" y="155" width="132" height="6" rx="3" fill="#7aa2f7" opacity="0.85"/>
  <text x="377" y="162" fill="#7aa2f7" font-family="'Courier New',Courier,monospace" font-size="8">94%</text>

  <text x="404" y="162" fill="#00f2fe" font-family="'Courier New',Courier,monospace" font-size="8.5">DEVOPS</text>
  <rect x="458" y="155" width="130" height="6" rx="3" fill="#1f2335"/>
  <rect x="458" y="155" width="104" height="6" rx="3" fill="#00f2fe" opacity="0.85"/>
  <text x="593" y="162" fill="#00f2fe" font-family="'Courier New',Courier,monospace" font-size="8">80%</text>

  <!-- SKILL BARS ROW 2 -->
  <text x="148" y="178" fill="#bb9af7" font-family="'Courier New',Courier,monospace" font-size="8.5">AI / ML</text>
  <rect x="232" y="171" width="140" height="6" rx="3" fill="#1f2335"/>
  <rect x="232" y="171" width="125" height="6" rx="3" fill="#bb9af7" opacity="0.85"/>
  <text x="377" y="178" fill="#bb9af7" font-family="'Courier New',Courier,monospace" font-size="8">89%</text>

  <text x="404" y="178" fill="#00ff88" font-family="'Courier New',Courier,monospace" font-size="8.5">SECURITY</text>
  <rect x="458" y="171" width="130" height="6" rx="3" fill="#1f2335"/>
  <rect x="458" y="171" width="113" height="6" rx="3" fill="#00ff88" opacity="0.85"/>
  <text x="593" y="178" fill="#00ff88" font-family="'Courier New',Courier,monospace" font-size="8">87%</text>

