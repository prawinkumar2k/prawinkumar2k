name: 📊 Generate GitHub Metrics

# ── Requires secrets ──────────────────────────────────────────────────────────
# METRICS_TOKEN : PAT with read:user + public_repo scopes
# PAGESPEED_TOKEN: (optional) Google PageSpeed Insights API key
# Add at: Settings → Secrets → Actions → New repository secret

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    name: Generate All Metric Cards
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── 1. CORE — Languages · Habits · Lines ─────────────────────────────────
      - name: Core Metrics (Languages + Habits + Lines)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prawinkumar2k
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          filename: metrics.core.svg
          committer_branch: output
          output_action: commit

          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_lines: yes
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

      # ── 2. ISOMETRIC 3D CALENDAR — Animated ──────────────────────────────────
      - name: Isometric 3D Contribution Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prawinkumar2k
          base: ""
          config_timezone: Asia/Kolkata
          filename: metrics.isocalendar.svg
          committer_branch: output
          output_action: commit

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── 3. ACHIEVEMENTS ───────────────────────────────────────────────────────
      - name: GitHub Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prawinkumar2k
          base: ""
          config_timezone: Asia/Kolkata
          filename: metrics.achievements.svg
          committer_branch: output
          output_action: commit

          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0

      # ── 4. ACTIVITY FEED ──────────────────────────────────────────────────────
      - name: Recent GitHub Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prawinkumar2k
          base: ""
          config_timezone: Asia/Kolkata
          filename: metrics.activity.svg
          committer_branch: output
          output_action: commit

          plugin_activity: yes
          plugin_activity_limit: 10
          plugin_activity_days: 14
          plugin_activity_filter: all

      # ── 5. FULL YEAR CALENDAR ─────────────────────────────────────────────────
      - name: Full Year Contribution Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prawinkumar2k
          base: ""
          config_timezone: Asia/Kolkata
          filename: metrics.calendar.svg
          committer_branch: output
          output_action: commit

          plugin_calendar: yes
          plugin_calendar_limit: 1

      # ── 6. PAGESPEED — Portfolio site performance score ───────────────────────
      - name: Portfolio PageSpeed Insights
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prawinkumar2k
          base: ""
          config_timezone: Asia/Kolkata
          filename: metrics.pagespeed.svg
          committer_branch: output
          output_action: commit

          plugin_pagespeed: yes
          plugin_pagespeed_url: https://prawin.vercel.app
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_screenshot: yes

      # ── 7. REACTIONS — Emoji reactions received on issues/PRs ────────────────
      - name: Emoji Reactions Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prawinkumar2k
          base: ""
          config_timezone: Asia/Kolkata
          filename: metrics.reactions.svg
          committer_branch: output
          output_action: commit

          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_days: 0
          plugin_reactions_display: absolute
          plugin_reactions_details: percentage, count
