name: 📊 Generate GitHub Metrics

# ── Requires a PAT secret named METRICS_TOKEN ────────────────────────────────
# Scopes needed: read:user, read:org, public_repo
# Add it at: Settings → Secrets → Actions → New repository secret

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    name: Generate All Metric Cards
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── 1. CORE METRICS — Languages · Habits · Lines ─────────────────────────
      - name: Core Metrics (Languages + Habits + Lines)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prawinkumar2k
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          filename: metrics.core.svg
          committer_branch: output
          output_action: commit

          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_lines: yes
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

      # ── 2. ISOMETRIC CALENDAR — Animated 3D contribution heatmap ─────────────
      - name: Isometric 3D Contribution Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prawinkumar2k
          base: ""
          config_timezone: Asia/Kolkata
          filename: metrics.isocalendar.svg
          committer_branch: output
          output_action: commit

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── 3. ACHIEVEMENTS — GitHub achievement badge wall ───────────────────────
      - name: GitHub Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prawinkumar2k
          base: ""
          config_timezone: Asia/Kolkata
          filename: metrics.achievements.svg
          committer_branch: output
          output_action: commit

          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0

      # ── 4. ACTIVITY FEED — Recent GitHub events ───────────────────────────────
      - name: Recent GitHub Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prawinkumar2k
          base: ""
          config_timezone: Asia/Kolkata
          filename: metrics.activity.svg
          committer_branch: output
          output_action: commit

          plugin_activity: yes
          plugin_activity_limit: 10
          plugin_activity_days: 14
          plugin_activity_filter: all

      # ── 5. FULL YEAR CALENDAR — Extended contribution heatmap ─────────────────
      - name: Full Year Contribution Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: prawinkumar2k
          base: ""
          config_timezone: Asia/Kolkata
          filename: metrics.calendar.svg
          committer_branch: output
          output_action: commit

          plugin_calendar: yes
          plugin_calendar_limit: 1
